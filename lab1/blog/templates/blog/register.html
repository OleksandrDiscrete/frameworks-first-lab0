<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <h2 class="mb-4">Створення профілю</h2>
        <div class="card p-4 shadow-sm border-0">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100 mb-3">Зареєструватися</button>
            </form>
            <div class="text-center">
                <small class="text-muted">Вже маєте акаунт? <a href="{% url 'login' %}">Увійдіть</a></small>
            </div>
        </div>
    </div>
</body>
</html>
