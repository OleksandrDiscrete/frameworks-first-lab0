<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Категорії блогу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Мій Блог</span>
            <div>
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="text-decoration-none text-dark me-3">Привіт, <b>{{ user.username }}</b>!</a>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger">Вийти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-primary me-2">Увійти</a>
                    <a href="{% url 'register' %}" class="btn btn-sm btn-primary">Реєстрація</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary fw-bold">Категорії Блогу</h1>
            <a href="{% url 'article_list' %}" class="btn btn-outline-primary btn-lg">Всі статті</a>
        </div>
        <hr class="mb-4">
        
        <div class="row">
            {% for cat in categories %}
            <div class="col-md-4 mb-4">
                <a href="{% url 'category_detail' cat.pk %}" class="text-decoration-none">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body">
                            <h4 class="card-title text-primary">{{ cat.name }}</h4>
                            <p class="card-text text-muted">{{ cat.description }}</p>
                        </div>
                        <div class="card-footer bg-white border-0">
                            <span class="badge bg-success">Кількість статей: {{ cat.articles_count }}</span>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
