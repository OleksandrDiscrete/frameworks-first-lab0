<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% if form.instance.pk %}Редагування статті{% else %}Нова стаття{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Мій Блог</span>
            <div>
                <a href="{% url 'article_list' %}" class="btn btn-sm btn-outline-secondary me-2">Всі статті</a>
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger">Вийти</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <h2 class="mb-4 text-primary">
            {% if form.instance.pk %}Редагування статті{% else %}Створення нової статті{% endif %}
        </h2>
        <div class="card shadow-sm border-0 p-4 bg-white">
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Зберегти</button>
                    <a href="{% url 'article_list' %}" class="btn btn-secondary">Скасувати</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
