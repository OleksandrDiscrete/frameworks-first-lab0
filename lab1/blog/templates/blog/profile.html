<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Профіль користувача</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Мій Блог</span>
            <div>
                <a href="{% url 'category_list' %}" class="btn btn-sm btn-outline-secondary me-2">Головна</a>
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-outline-danger">Вийти</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body text-center">
                <h2 class="card-title text-primary">{{ user.username }}</h2>
                <p class="text-muted">{{ user.email }}</p>
                <hr>
                <h5 class="text-start">Профіль</h5>
                <p class="text-start">{{ user.profile.bio|default:"Користувач ще не додав інформацію про себе." }}</p>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h4 class="mb-4">Редагувати профіль</h4>
                <form method="POST">
                    {% csrf_token %}
                    {{ u_form.as_p }}
                    {{ p_form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Зберегти зміни</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
